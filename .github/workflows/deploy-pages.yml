name: Deploy Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.pages-status.outputs.should_deploy }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build resume site
        run: npm run build

      - name: Detect GitHub Pages status
        id: pages-status
        uses: actions/github-script@v9
        env:
          PAGES_ENABLEMENT_TOKEN: ${{ secrets.PAGES_ENABLEMENT_TOKEN }}
        with:
          script: |
            try {
              await github.request("GET /repos/{owner}/{repo}/pages", {
                owner: context.repo.owner,
                repo: context.repo.repo,
              });

              core.setOutput("should_deploy", "true");
              core.setOutput("mode", "configured");
            } catch (error) {
              if (error.status === 404) {
                if (process.env.PAGES_ENABLEMENT_TOKEN) {
                  core.setOutput("should_deploy", "true");
                  core.setOutput("mode", "enable");
                } else {
                  core.setOutput("should_deploy", "false");
                  core.setOutput("mode", "disabled");
                  core.notice(
                    "GitHub Pages is not enabled for this repository. Enable Settings > Pages > Source: GitHub Actions, or add a PAGES_ENABLEMENT_TOKEN secret to allow automatic enablement.",
                  );
                }

                return;
              }

              throw error;
            }

      - name: Configure GitHub Pages
        if: steps.pages-status.outputs.mode == 'configured'
        uses: actions/configure-pages@v6

      - name: Enable and configure GitHub Pages
        if: steps.pages-status.outputs.mode == 'enable'
        uses: actions/configure-pages@v6
        with:
          token: ${{ secrets.PAGES_ENABLEMENT_TOKEN }}
          enablement: true

      - name: Upload Pages artifact
        if: steps.pages-status.outputs.should_deploy == 'true'
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: dist

  deploy:
    needs: build
    if: needs.build.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
