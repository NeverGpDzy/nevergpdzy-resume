name: Deploy Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.pages-status.outputs.should_deploy }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build resume site
        run: npm run build

      - name: Detect GitHub Pages status
        id: pages-status
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          HAS_ENABLEMENT_TOKEN: ${{ secrets.PAGES_ENABLEMENT_TOKEN != '' }}
        run: |
          http_status="$(curl -sS -o /dev/null -w '%{http_code}' \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPOSITORY}/pages")"

          case "${http_status}" in
            200)
              echo "should_deploy=true" >> "${GITHUB_OUTPUT}"
              echo "mode=configured" >> "${GITHUB_OUTPUT}"
              ;;
            404)
              if [ "${HAS_ENABLEMENT_TOKEN}" = "true" ]; then
                echo "should_deploy=true" >> "${GITHUB_OUTPUT}"
                echo "mode=enable" >> "${GITHUB_OUTPUT}"
              else
                echo "should_deploy=false" >> "${GITHUB_OUTPUT}"
                echo "mode=disabled" >> "${GITHUB_OUTPUT}"
                cat <<'EOF' >> "${GITHUB_STEP_SUMMARY}"
                ## GitHub Pages is not enabled yet

                This repository does not have GitHub Pages configured, so deployment was skipped.

                Choose one of these one-time setup options, then rerun this workflow:
                1. Open Settings > Pages and set Source to GitHub Actions.
                2. Or add a `PAGES_ENABLEMENT_TOKEN` repository secret so the workflow can enable Pages automatically.
                EOF
              fi
              ;;
            *)
              echo "Unexpected GitHub Pages API status: ${http_status}" >&2
              exit 1
              ;;
          esac

      - name: Configure GitHub Pages
        if: steps.pages-status.outputs.mode == 'configured'
        uses: actions/configure-pages@v6

      - name: Enable and configure GitHub Pages
        if: steps.pages-status.outputs.mode == 'enable'
        uses: actions/configure-pages@v6
        with:
          token: ${{ secrets.PAGES_ENABLEMENT_TOKEN }}
          enablement: true

      - name: Upload Pages artifact
        if: steps.pages-status.outputs.should_deploy == 'true'
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: dist

  deploy:
    needs: build
    if: needs.build.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
